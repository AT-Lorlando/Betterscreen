version: 2

project_name: betterscreen

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: betterscreen
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: SHA256SUMS

changelog:
  sort: asc
  filters:
    exclude:
      - "^test:"
      - "^docs:"

release:
  draft: false
